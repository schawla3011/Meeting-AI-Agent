services:
  - type: web
    name: antigravity-meeting-recorder
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false   # You will paste this value in the Render dashboard
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /health
